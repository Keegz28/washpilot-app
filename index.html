<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WashPilot">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="WashPilot - Mobile Car Wash Business Manager">
    <title>WashPilot</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="lock-screen" class="lock-screen">
        <div class="lock-content">
            <div class="lock-icon">🔒</div>
            <h1>WashPilot</h1>
            <p>Enter PIN to continue</p>
            <div class="pin-dots" id="pin-dots">
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
            </div>
            <div class="pin-pad" id="pin-pad">
                <button class="pin-key" data-key="1">1</button>
                <button class="pin-key" data-key="2">2</button>
                <button class="pin-key" data-key="3">3</button>
                <button class="pin-key" data-key="4">4</button>
                <button class="pin-key" data-key="5">5</button>
                <button class="pin-key" data-key="6">6</button>
                <button class="pin-key" data-key="7">7</button>
                <button class="pin-key" data-key="8">8</button>
                <button class="pin-key" data-key="9">9</button>
                <button class="pin-key pin-key-empty"></button>
                <button class="pin-key" data-key="0">0</button>
                <button class="pin-key pin-key-del" data-key="del">⌫</button>
            </div>
            <p class="pin-error" id="pin-error"></p>
        </div>
    </div>

    <div id="setup-screen" class="lock-screen" style="display:none;">
        <div class="lock-content">
            <div class="lock-icon">🚀</div>
            <h1>Welcome to WashPilot</h1>
            <p>Set up your 4-digit PIN</p>
            <div class="pin-dots" id="setup-dots">
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
            </div>
            <p class="pin-instruction" id="setup-instruction">Enter your PIN</p>
            <div class="pin-pad" id="setup-pad">
                <button class="pin-key" data-key="1">1</button>
                <button class="pin-key" data-key="2">2</button>
                <button class="pin-key" data-key="3">3</button>
                <button class="pin-key" data-key="4">4</button>
                <button class="pin-key" data-key="5">5</button>
                <button class="pin-key" data-key="6">6</button>
                <button class="pin-key" data-key="7">7</button>
                <button class="pin-key" data-key="8">8</button>
                <button class="pin-key" data-key="9">9</button>
                <button class="pin-key pin-key-empty"></button>
                <button class="pin-key" data-key="0">0</button>
                <button class="pin-key pin-key-del" data-key="del">⌫</button>
            </div>
            <p class="pin-error" id="setup-error"></p>
        </div>
    </div>

    <div id="app" class="app" style="display:none;">
        <header class="app-header" id="app-header">
            <h1 id="page-title">Dashboard</h1>
            <button class="header-btn" id="header-action" style="display:none;"></button>
        </header>

        <main class="app-content" id="app-content">
            <div class="view" id="view-dashboard"></div>
            <div class="view" id="view-bookings" style="display:none;"></div>
            <div class="view" id="view-route" style="display:none;"></div>
            <div class="view" id="view-income" style="display:none;"></div>
            <div class="view" id="view-customers" style="display:none;"></div>
            <div class="view" id="view-more" style="display:none;"></div>
        </main>

        <nav class="bottom-nav" id="bottom-nav">
            <button class="nav-btn active" data-view="dashboard">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-btn" data-view="bookings">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg>
                <span class="nav-label">Jobs</span>
            </button>
            <button class="nav-btn" data-view="route">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
                <span class="nav-label">Route</span>
            </button>
            <button class="nav-btn" data-view="income">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span class="nav-label">Income</span>
            </button>
            <button class="nav-btn" data-view="more">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                <span class="nav-label">More</span>
            </button>
        </nav>
    </div>

    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/bookings.js"></script>
    <script src="js/customers.js"></script>
    <script src="js/income.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/equipment.js"></script>
    <script src="js/route.js"></script>
    <script src="js/savings.js"></script>
    <script src="js/invoice.js"></script>
    <script src="js/tax.js"></script>
    <script src="js/sop.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => Auth.init());
    </script>
</body>
</html>
